name: release

# 打 tag（v*）触发：macOS (Apple Silicon) 构建 dmg，发布到主仓公开 Releases。
# 初版未签名（ad-hoc）；Intel(x64) / Windows / Linux + Apple 证书/公证后续接入。
# （x64 暂移除：GitHub macos-13 Intel runner 紧缺、排队过久，且 Intel Mac 占比已低。）
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14 # Apple Silicon
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ matrix.runner }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}

      - run: npm ci

      - name: Verify release version
        run: npm run release:check-version

      - name: Build (UI + 单文件 daemon + Tauri dmg)
        run: npm run app:build --workspace @ew/desktop

      - name: Upload dmg to Release
        uses: softprops/action-gh-release@v3
        with:
          files: apps/desktop/src-tauri/target/release/bundle/dmg/*_${{ matrix.arch }}.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
