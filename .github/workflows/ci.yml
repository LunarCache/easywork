name: ci

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Install Playwright Chromium
        run: npm run e2e:install

      - name: Playwright UI e2e
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  windows-build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: windows-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        run: npm run release:check-version

      - name: Clean stale Windows bundles
        run: Remove-Item -Recurse -Force apps/desktop/src-tauri/target/release/bundle -ErrorAction SilentlyContinue

      - name: Build Windows desktop critical path
        run: npm run app:build --workspace @ew/desktop -- --bundles nsis

      - name: Smoke packaged daemon
        run: npm run smoke:daemon-sea

      - name: Verify Windows artifacts
        run: npm run release:check-artifacts -- windows --bundles nsis

      - name: Upload Windows CI installer
        uses: actions/upload-artifact@v6
        with:
          name: easywork-windows-nsis
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
