<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a1a" />
    <title>EasyWork — 本地 AI 工作台</title>
    <script>
      // 防 FOUC：React 挂载前先按持久化偏好给 <html> 打上明暗/主题色 class。
      (function () {
        try {
          var p = JSON.parse(localStorage.getItem("ew.theme") || "{}");
          var appearance = p.appearance || "system";
          var prefersDark = matchMedia("(prefers-color-scheme: dark)").matches;
          if (appearance === "dark" || (appearance === "system" && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
          if (p.colorTheme && p.colorTheme !== "black") {
            document.documentElement.classList.add("theme-" + p.colorTheme);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
