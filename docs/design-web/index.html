# EasyWork · 系统设计与功能详解（学习向）

> 这是一份**讲透原理**的长文：把整体架构与各子系统的功能设计、关键数据流、以及"为什么这样设计"一并讲清，供学习与上手。
> 速查功能清单见 [FEATURES](FEATURES.md)；架构/环境变量见 [ARCHITECTURE](ARCHITECTURE.md)；开发约定与正确性约束的权威来源是 [AGENTS.md](../AGENTS.md)。
> 文中 `file:line` 形式的锚点便于跳转源码核对。

---

## 0. 心智模型：一个 core + 瘦客户端 + 进程内渠道适配

EasyWork 是**纯推理（无训练/微调）的跨平台本地 AI 工作台**。理解全局只需记住一句话：

> **一个无头 Node 守护进程拥有 Agent 与模型运行时；UI / CLI / `/v1` 调用方是瘦客户端，渠道适配器则是 core 进程内子系统。**

"大脑"包含：托管的 pi Agent 内核、统一 `llama serve` router 进程、云端 provider、工具/Skills/MCP、记忆和 SQLite。对外暴露 **Fastify HTTP + SSE + `/v1` 网关**。

谁在 core 外？
- **Tauri 桌面 webview**（`apps/ui`，React）——应用内聊天；
- **CLI**（`easywork`，`apps/daemon`）——终端里 repl/run/管理；
- **任意 `/v1` 客户端**（Claude Code、openai SDK……）——把 EasyWork 当本地模型端点。
- **Telegram / Feishu / WeChat 平台**——经 long-poll、WebSocket 或 webhook 与 core 内的 adapter 通信。

应用内聊天、CLI agent 与外部渠道都进入 `SessionHost`，因此复用会话、记忆和工具。`/v1` 是模型兼容网关：它复用同一 daemon 的 router、provider runtime 与鉴权，但不进入 AgentSession、记忆注入或 EasyWork 工具。`@ew/core` 是被 `apps/daemon` 调用的库；Tauri desktop 不直接 `createCore()`，而是启动随附的 daemon sidecar。

```
┌────────── core 外 ──────────┐            ┌──────────── @ew/core 守护进程 ─────────────┐
│ Tauri webview / CLI         │ HTTP+SSE   │ Fastify 路由 + SessionHost(pi)             │
│ 任意 /v1 客户端             │ /v1     ─▶ │ /v1 网关 + RouterServerManager + providers │
│ TG / Feishu / WeChat 平台   │ 平台协议   │ ChannelOperations                         │
└─────────────────────────────┘            │   └ Gateway + ConnectorHost + adapters     │
                                           │ 记忆 / Skills / MCP / SQLite               │
                                           └────────────────────────────────────────────┘
```

---

## 1. 仓库与包结构（Monorepo）

统一 **npm workspaces + turbo**（环境无 pnpm）。包之间单向依赖，`shared` 是所有人的底座：

| 包 | 角色 |
|---|---|
| `@ew/shared` | **契约层**：Zod schema + TS 类型 + 少量运行时 helper；运行时依赖 Zod，不依赖其它 EasyWork 包。 |
| `@ew/core` | 守护进程库：装配全部子系统，`createCore()` → `CoreServer`；跨路由应用层边界如 `ChannelOperations` 也在这里。 |
| `@ew/providers` | 推理引擎实现：OpenAI-兼容引擎、`llama serve` 子进程引擎（`LlamaServeEngine`）、Harmony 解析。 |
| `@ew/memory` | 本地 Core Memory（分层 + sqlite-vec ⊕ 词法）+ additive external recall；Mem0 当前只是可由宿主注入的附加 provider 骨架。 |
| `@ew/skills` | Skills 发现/管理（SKILL.md frontmatter）。 |
| `@ew/mcp` | MCP 客户端管理（stdio/http、探测、cooloff、桥成工具）。 |
| `@ew/im-connectors` | Channel Gateway（adapter registry + 配置/状态/webhook/allowlist）与平台连接器（Telegram long-poll、Feishu/Lark WebSocket 默认 + webhook 高级模式、WeChat iLink QR + long-poll 已实现，Discord/WeCom 待补）。 |
| `@ew/sdk` | 瘦客户端用的 HTTP/SSE 客户端。 |
| `apps/ui` | React 桌面前端。 |
| `apps/daemon` | `easywork` CLI（既是 `serve` 守护，也是终端客户端）。 |
| `apps/desktop` | Tauri 2 Rust 壳 + daemon sidecar。 |

**唯一原生件 = `sqlite-vec`** 可加载扩展（各平台预编译二进制随包；缺失则向量召回降级纯词法，不崩）。本地推理走外部统一 `llama` 二进制（[llama.app](https://llama.app)）的 router 模式；DB 用 Node 内置 `node:sqlite`。

---

## 2. 契约层 `@ew/shared` —— "OpenAI-shaped 通用语言"

贯穿全系统的设计选择：**契约镜像 OpenAI 的请求/响应形状**。原因有三：(a) 云端 provider 平凡映射；(b) `/v1` 网关进出翻译成本低；(c) 外部 OpenAI/Anthropic SDK 可直连。

核心契约（`packages/shared/src/*`）：

- **`ChatMessage` / `ContentPart`**（`message.ts`）：角色 `system/user/assistant/tool`；内容是 string 或 `ContentPart[]`（判别联合 `text/reasoning/image/audio/file`）。
  - **关键不变量**：`reasoning`（思考）片段**仅用于持久化与回放，绝不发给模型**。`messageText()` 只取 `text` 片段，所有"喂给模型"的转换器（pi-adapt / ew-extensions / openai-messages）都显式剔除 reasoning。**新增任何模型侧转换器必须同样处理。**
  - `ChatMessage` 中工具调用的 `arguments` 保留原始 JSON 字符串，便于协议翻译和坏 JSON 持久化；tool-call 解析、交织与迭代由 pi 内核负责。EasyWork customTool 收到 pi 已解析的参数后，再由 `defineTool` 的 Zod schema 校验，失败作为工具错误回喂模型。
- **`InferenceEngine` / `ChatStreamEvent`**（`provider.ts`）：引擎统一接口 `chat / chatStream / embed? + capabilities`。`ChatStreamEvent` 是**判别联合**（`text-delta / reasoning-delta / tool-call-start|args-delta|end / usage / done / error`）。**为什么不用裸字符串流**：一次助手轮里 prose 与 tool call 会交织（先文本、再起一个工具调用、名字先到、参数 JSON 增量到……），裸字符串无法表达；每种关切给一个独立帧。`error` 是**一等终止事件**，不可伪装成 `done`。
- **`Tool` / `ToolProvider` / `ToolExecContext`**（`tool.ts`）：内置/MCP/Skill 工具统一成 `Tool`，含 `definition / source / requiresApproval / execute`。`ToolResult` 区分 `content`（喂模型）与 `display?`（更丰富的 UI 载荷，不喂模型）。审批模型：`ApprovalPolicy`（never/always/first-use 或谓词）+ `ApprovalGate.request()`（UI 弹窗/IM 确认/自动策略的抽象）。`defineTool`（`@ew/tools`）由 zod 生成参数 JSON Schema——**必须 `target:"jsonSchema7"`**（numeric exclusiveMinimum）；`openApi3` 会输出 draft-4 布尔 `exclusiveMinimum:true`，严格 provider（DeepSeek 等）校验工具 schema 即 400、整轮空输出。
- **`MemoryProvider`**（`memory.ts`）：`recall/write/edit/list/delete/deleteBySession/deleteByScope/observe`，全带 scope。语义见第 6 节。
- **`AgentEvent`**（`events.ts`）：**对外 SSE 联合**（pi 事件经宿主映射、或由运行宿主补充后供 UI / IM / SDK 消费，渠道无关、只认 threadId）：`text / reasoning / tool-start / tool-end / tool-progress / approval-request / memory-recall / usage / retry / compaction / artifacts / final / error`。其中 `artifacts` 是普通对话成功提交后由宿主生成的本轮最终文件清单，不属于 pi 事件映射。
- **`ConversationRepo` / `Project` / `Thread`**（`conversation.ts`）：`ApprovalMode`（read-only/approve-each/auto-edits/full-auto，工程级档位）、Project（含 `workspaceDir` 决定是否工作区项目）、`resolveThreadForChannel(kind, channelUserId)`（渠道身份→稳定 thread）。
- **`ChannelConfig/ChannelAdapterMeta/InboundMessage/ChannelTarget`**（`im.ts`）：外部渠道配置、能力元数据、入站消息和回复目标的通用契约；旧 `ChannelConnector` 仍保留兼容层。

## 3. 核心守护进程 `@ew/core`

入口 `createCore(opts): CoreServer`（`packages/core/src/server/app.ts`）装配并接线所有子系统，返回带 `start()/stop()` + 各 manager 引用的句柄。中枢对象是 **`SessionHost`**，注入 `local` 后端 / `providers` / `memory` / `repo` / `mcp` / `builtins`。

**鉴权 / CORS**：先 CORS 钩子（必须先于鉴权；OPTIONS 直接 204），再 Bearer-token 钩子守住管理面与内部 API。例外只有 `/health` 和外部渠道 webhook：`/im/:id/webhook` 不要求 EasyWork 内部 Bearer，因为真实平台回调通常不能带该 header；平台签名/secret 校验由 adapter 负责。core 仅为 webhook 捕获 raw body 供签名计算，并在 `Content-Length` 与流式读取过程中执行 32MiB 上限。

**存储**：SQLite（`node:sqlite`，经 `createRequire` 运行时引入以躲过打包器静态解析）。`ConversationRepo` 存项目/线程/消息（含 FTS5 全文检索）；设置（providers / mcp.servers / local.bindHost / embed 路径等）存键值。渠道 secret 例外：`im.connectors` 只存非敏感配置，真实值经 `ChannelSecretStore` 进入 macOS Keychain / Linux Secret Service / Windows 当前用户 DPAPI；读取 API 通过独立 read view 返回 `secretKeys`。记忆使用独立索引表（见第 6 节）。

---

## 4. Agent 内核 = 托管 pi `AgentSession`

> **自研 agent loop / tool-registry / tool-healing 已删除**，agent 内核 = 托管 [`@earendil-works/pi`](https://github.com/earendil-works/pi) 的 `AgentSession`（无头嵌入）。EasyWork 退化为它的宿主/集成层。

### 4.1 SessionHost 与"每 thread 串行化"

`SessionHost`（`session-host.ts`）按 `threadId` 复用 `HostedSession`（缓存键 = `modelId,cwd,workspace,memoryScope,excludeSkills`，**任一变化即重建会话**）。

**每 thread 串行化 run**（`session-host.ts`）用 promise 链实现——同一会话同时只跑一轮：

```
prev = runChain.get(threadId) ?? resolve()
runChain.set(threadId, prev.then(() => mine))   // mine 在 finally resolve
await prev.catch(()=>{})                         // 等上一轮收尾
yield* runOne(input)
```

**为什么**（正确性约束 #1）：pi 的 `subscribe` 是**会话级**，两轮并发会跨请求串流事件 + 审批错配（IM 连发/双击/重连可触发）。

### 4.2 一次 run 的端到端生命周期

```
POST /agent/run (packages/core/src/server/app.ts)
  → 校验 + registry.resolve(model)
  → 解析 project/workspace（isWorkspace = !!project.workspaceDir）
  → cwd = workspaceDir(工作区) 或 chatWorkspaceDir(threadId)(聊天，每会话隔离工件目录)
  → 确保 thread 行存在（消息行延迟到成功才落库）
  → hijack reply 为裸 SSE：AbortController 绑 raw.on("close")；raw.on("error") 吞掉；
     send() 每次 write 前守 !writableEnded && !destroyed
  → 抽出本轮用户文本 + 图片(base64)（仅当前轮；历史图在 pi 会话上下文里）
  → sessionHost.run({ threadId, model, text, images, cwd, workspace, memoryScope,
                       approval, approvalMode, signal, sampling, think, excludeSkills })
        → getOrCreate → createAgentSession(...) + 采样注入 wrapper + 权限/记忆扩展
        → 快照 messages（用于取消回滚）
        → session.subscribe(ev => mapSessionEvent(ev) → 队列)
        → session.prompt(text + /think|/no_think 指令, { images })
        → 事件泵 yield AgentEvent
  → 每个 AgentEvent: recorder.push + send() 给客户端
  → 成功(!aborted)才落库：user 消息 + recorder 重建的 assistant/tool 消息 + 最终助手消息
  → finally: 写 data:[DONE] + 结束 socket
```

**取消是两层回滚**：① pi 进程内 messages 从快照恢复（取消轮不计入模型上下文）；② HTTP 层若 aborted 则**整轮不落库**（user 消息 + 部分助手输出 + 工具往返全丢，与 pi 上下文回滚一致）；首轮取消且无历史则删掉空 thread。

### 4.3 事件映射唯一边界

`mapSessionEvent(ev): AgentEvent[]`（`session-host.ts`）是 pi→SSE 的**唯一**翻译边界（另一个边界是 `pi-adapt.ts` 给 `/v1` 网关）。映射：`message_update`→text/reasoning/error；`tool_execution_start`→tool-start；`tool_execution_end`→tool-end（把 `result.details` 提到 `result.display` 供 UI 渲染来源/引用/diff）；`message_end`→usage；`agent_end`→final；`auto_retry_start`→retry（重试中提示）；`compaction_start/end`→compaction（end 带 `ok`〔中止/失败=false，不谎报成功〕+ token 增减）；`agent_end{willRetry}` **不发 final**（重试/压缩续写在即），`agent_end` 末条 assistant `stopReason:"error"` → **冒泡 `error`**（provider 在 loop 内报错时 pi 不发流式 error delta，否则会被吞成空 final）。`error` pi 事件必须映成 `AgentEvent.error`，**绝不伪装成正常结束**。

`/v1` 的本地 proxy、云端 pi 与 OpenAI / Anthropic engine fallback 流全部复用同一断流纪律：监听 `raw.on("error")`，每次写入与结束前检查 `writableEnded/destroyed`，客户端中途断开只触发 abort，不再向已关闭 response 写 error / DONE / message_stop 帧。

### 4.4 工具审批（4 档）+ 挂起/恢复

分类（`ew-extensions.ts`）：READ `{read,ls,grep,find}` / WRITE `{edit,write}` / `bash` / `mcp__*` / 其余 safe。决策矩阵：

| 档位 | read/safe | write(edit/write) | bash | mcp__ |
|---|---|---|---|---|
| read-only | 放行 | 阻断 | 阻断 | 阻断 |
| approve-each | 放行 | 审批 | 审批 | 审批 |
| auto-edits | 放行 | 放行 | 审批 | 审批 |
| full-auto | 放行 | 放行 | 放行 | 放行 |

**挂起/恢复跨请求**：危险工具经 `SseApprovalGate.request`（`approval-sse.ts`）生成 UUID、发 `approval-request` SSE、注册 resolver、返回挂起的 promise（超时默认 120s 或 abort → 视为 deny）。客户端经 `POST /agent/approve {id,verdict}` 唤醒。**无 UI 连接时**（headless/IM 无人应答），本应审批的工具**直接放行**避免死锁。聊天模式跑 `auto-edits`（写在工件目录内放行、bash 逐条审批），工作区模式用项目的 `approvalMode`。

### 4.5 工作区路径限定

pi 自带 fs 工具**不做路径沙箱**（`write ../x` 会越界）。EasyWork 兜底（`ew-extensions.ts`）：`escapesCwd` 检查含路径的参数（`path/file_path/dir/...`），经 **`realResolve`（realpath 解软链后再拼不存在的尾部）** 与 cwd 根比较，越界返回该字符串。在权限扩展里**先于档位决策**执行 → **所有档位都拦**。`bash` 豁免静态路径检查（任意 shell 无法路径沙箱）→ 纯靠审批把守。权限扩展**聊天与工作区都装载**，故聊天模式 fs 工具也被 cwd 限定。

### 4.6 模型解析 + 采样注入 + 图片能力

`resolveModel`（`session-host.ts`）：**先本地**（`local.baseUrlFor(modelId)` 命中 → `provider:"local"`, `input:["text","image"]`, ctx 来自 `local.contexts()`），**再云端**（`providers.resolveModelRef` → pi `ModelRegistry`）。云端 provider 模型在 EasyWork 内部使用 `provider:<providerId>:<modelId>` route id，避免不同 provider 的同名模型互相覆盖；进入 pi / 上游 OpenAI-compatible 请求前再还原为真实 `modelId`。本地 server 设了 `--api-key`（0.0.0.0 暴露）时把 key 注入 pi auth，连回环也带 Bearer。

**streamFn 包装（采样 + 思考 + 缓存）**：pi 不在 `createAgentSession` 暴露这些，故统一包装 `session.agent.streamFn`：
- **采样**：本轮显式 `input.sampling` 优先；未显式传入且模型为本地模型时，`SessionHost` 从 `LocalModelSettingsStore` 读取模型页保存的默认运行参数。`temperature/maxTokens` 走 StreamOptions，其余经 `onPayload` 注入请求体；`top_k/min_p/repeat_penalty` 是 llama.cpp 扩展，**仅 `provider==="local"` 注入**。云端 provider 默认采样不由本地模型页管理。
- **思考（分级，off/low/medium/high）**：每轮 `session.setThinkingLevel(level)`（pi 已登记的推理模型据此真分级）+ `onPayload` 注入 provider 实际识别的参数：
  - **云端** `injectCloudThinking`：`thinking:{type:"enabled"/"disabled"}`（off→真关，省 reasoning token）+ `reasoning_effort:<档位>`（DeepSeek-V4 等 OpenAI-SDK 思考模型扩展，经请求体顶层透传 = 其 SDK 的 extra_body）。
  - **本地** `injectLocalThinking`：`chat_template_kwargs.enable_thinking`（llama.cpp 思考开关）+ `thinking_budget_tokens`（off=0/low=1024/medium=4096/high=16384）。取代旧 `/think` 文本 hack。
  - 不支持该字段的 provider 会忽略/拒绝——故按 local/cloud 分别注入；不在显示层藏 reasoning（参数层即关）。
  - `/models.modelSources[].reasoning` 把运行时能力投影给 UI。没有已保存偏好时，推理模型按 pi 默认 `medium`、其它模型 `off`；显式 `off` 也写入 `ew.think`，避免重载后重新启用。
- **prompt caching**：仅当运行时模型 API 为 `anthropic-messages` 时加 `cacheRetention:"long"` + `sessionId:threadId`；OpenAI-shaped 云端与本地模型都不注入这组 Anthropic 缓存选项。
- **自动重试**：`createAgentSession` 后 `setAutoRetryEnabled(true)`，provider 抖动/限流时 pi 自带退避重试。

**图片**：本地 runtime 当前标 `input:["text","image"]`，云端模型按逐模型 `inputModalities` 注册；pi 仅在用户实际附图时下发。误把图片发给非视觉上游时由引擎报错，纯文本路径不受影响。

### 4.7 跨重启 resume / 上下文用量 / dispose

- **SessionManager resume**（`session-host.ts`）：每 thread 一个 `<agentDir>/sessions/<threadId>.jsonl`，存在则 `open`（恢复含 compaction 状态），否则 `create`+lazy `setSessionFile`。**daemon 重启后模型仍保留重启前上下文**。注意这是**与 SQLite repo 平行的另一条持久化轨**：repo 是 UI/检索/渠道映射/项目元数据的真相源，pi JSONL 只承载"喂给模型的上下文"——别混淆。
- **lastUsage**（`session-host.ts`）：扫 JSONL 取最后一条 assistant usage，重开历史会话时回填上下文用量环（归档消息文本没有 token 计数，也不含 system/记忆/工具 schema 开销，必须来自 pi 测得的 usage）。
- **dispose / delete**：普通 dispose 丢弃抽取缓冲 + dispose pi 会话；来源对话删除则进入 thread 串行屏障，等待在途抽取、删除来源事实，并按 threadId **严格删除 JSONL 文件**（包括 daemon 重启后尚未 resume 的 cold session；失败向 API 冒泡，不宣称成功）。`/agent/run` 的历史提交也进入同一屏障：删除先到则拒绝迟到提交，提交先到则随后连同消息/FTS 一起删除。MCP 工具集变更或本地网络绑定变更会 `invalidateAll` 重建全部会话（customTools 在会话创建时固定）。
- **pi 设置调优**（`session-host.ts`）：pi 默认 `compaction.reserveTokens=16384` 会让 4k/8k 本地上下文**每轮都触发 compaction**（每次回复后白跑一次总结 LLM）→ 启动时写 `reserveTokens:2048`。

## 5. 推理引擎

### 5.1 InferenceEngine 契约

`InferenceEngine`（`provider.ts`）：`chat / chatStream(): AsyncIterable<ChatStreamEvent> / embed? + capabilities`。`ChatRequest` 引擎无关但镜像 OpenAI，外加 llama/vLLM 采样扩展 `topK/minP/repeatPenalty` 与 `reasoningEffort`，并带 out-of-band `signal`。

`OpenAICompatibleEngine`（`providers/openai-compatible.ts`）是主力：`buildBody` 映射成 OpenAI JSON；`chatStream` 解析 SSE，累积 `delta.content/reasoning_content`→text/reasoning-delta，累积 `delta.tool_calls[idx]`→tool-call-start/args-delta/end，末尾 usage+done；非 200 直接 yield 一个 `error` 帧。**Harmony 回退**（`harmony.ts`）：某些 llama.cpp 把 gpt-oss `<|channel|>analysis<|message|>…` 控制 token 漏进 content → 流式状态机路由到 reasoning/text 并剥离控制 token、缓冲半 token。**自连接恒走 127.0.0.1**（即便绑 0.0.0.0），有 key 则带 Bearer。

### 5.2 本地推理：统一 `llama serve` router 模式

中心是 `RouterServerManager`（`engine/router-server-manager.ts`），`LocalBackend` 的唯一实现。

- **一个进程、多模型**：`ensureRouter` 起**单个** `llama serve --models-dir <dir> --models-max <N> --models-autoload --host <h> --port <freePort> [--api-key]`，poll `/health` 就绪后构造**一个**内层 `OpenAICompatibleEngine` 指向 `127.0.0.1:<port>/v1`。
- **按 `model` 字段路由 = 子目录名（routerId）**：router 按 `--models-dir` 下子目录名发现模型，该名即客户端传的 `model`。`syncRoutes` 拉 `/v1/models`，每个非嵌入 id 包成 **`RouterModelEngine`**（唯一职责：把出站 `model` 固定为该 routerId）注册进 `EngineRegistry`。
- **按需 auto-load + 预热**：`--models-autoload` 首次请求懒加载；`load()` 额外调管理 API `POST /v1/models/load` 预热（更快首 token）。
- **`--models-max` LRU**：直接传给 router，**淘汰由 router 自己做**。
- **上下文**：默认用模型**原生最大上下文长度**（不传 `-c`）；UI 进度环分母由 GGUF header 的 `context_length` 提供。
- `baseUrlFor(modelId)` 命中返回回环 `/v1`、否则 undefined——这是**守护进程判定本地 vs 云端**的依据。所有变更操作走 `serialize()` promise 链防 race。

### 5.3 嵌入：独立 `llama serve -m --embedding` 进程

嵌入模型**刻意不进聊天 router**：`EMBED_RE = /embed|bert|bge|gte|e5|nomic|minilm/i` 在 `syncRoutes` 里过滤掉。它跑成自己的 `LlamaServeEngine`（`--embedding --pooling mean`，跳过 `--jinja`），独立端口；默认 `-ngl 999`，有可用 GPU 时会卸载计算，并非强制 CPU-only。`autoEnableEmbedding` 启动时只恢复持久化且仍存在的模型路径，或启用已位于默认路径的 nomic 模型；维度通过一次 probe 动态取得。**缺失则记忆降级纯词法，不崩**——嵌入是 markdown/文本真相源之上的派生缓存，永不硬依赖。

### 5.4 云端 provider

`ProviderManager`（`providers/manager.ts`）统一管理 pi-ai 内置 provider 与自定义兼容端点。`CloudProviderConfig = {id, kind, baseUrl?, api?, apiKey?, headers?, modelConfigs[]}`；`modelConfigs[]` 逐模型记录 `contextWindow/inputModalities/reasoning?/compatibilityMode/catalogRef?`。配置序列化进 SQLite `providers` 键，开机恢复。

`ProviderCatalog`（`providers/catalog.ts`）把 pi-ai 的 provider/model 注册表投影成设置页目录，并负责三件事：① `/providers/probe-models` 经标准 `/models` 探测自定义端点；② `auto` 按精确模型 ID 选择唯一候选或 provider 前缀候选，`catalog` 固定显式引用，`generic` 禁用模板；③ 生成注册到 pi `ModelRegistry` 的运行时模型。这里必须区分**运行时继承**、**保存时物化**与**协议行为**：名称、`reasoning`、`thinkingLevelMap`、输出上限可跨 API family 在运行时继承；上下文窗口与输入模态由 UI 在匹配 / 选择模板时复制进 `modelConfigs[]`，运行时不会覆盖已有配置；`compat` 只在模板 API 与当前 API 相同时物化。这样 Anthropic Messages 端点上的 DeepSeek 模型仍保留推理能力，又不会误套 OpenAI Chat 的角色/工具消息兼容规则。

每个 declared model 暴露为 provider-scoped route id（逻辑形状如 `provider:my-deepseek:deepseek-v4-pro`，provider/model 两段实际经 `encodeURIComponent`）；`OpenAICompatibleEngine.mapModelId` 与 `AgentProviderRuntime` 在上游边界还原真实模型名。`GET /models.modelSources[]` 返回 route id、provider/model 展示身份和 `reasoning` 能力。内置 provider 与自定义 provider 即使声明同名模型，也不会覆盖上下文窗口、偏好或路由；旧线程和外部客户端仍可通过 legacy 裸模型名回退解析。

### 5.5 模型管理（HF / 下载 / 扫描 / GGUF / 删除）

`ModelManager`（`models/manager.ts`）+ `hf.ts/download.ts/gguf.ts`：

- **HF 搜索 + 动态来源 + 变体分组**（`hf.ts`）：默认基址 `huggingface.co`；通用设置经 `/settings/huggingface` 持久化切换 `hf-mirror.com`，同一个可变 `HFClient` 基址同时服务搜索、文件树、普通 GGUF 与记忆 embedding 下载。`groupVariants`（纯函数、可单测）过滤 `.gguf`、把 **mmproj** 当视觉投影器单列、把多分片 `*-00001-of-00003.gguf` 合成一个逻辑变体（summed size + shardCount）、按量化 `IQx/Qx/BF16/F16/F32` 提取、按 size 升序（最小量化先出）。
- **断点续传下载**（`download.ts`）：异步生成器 yield `DownloadEvent`（queued/progress/shard/verifying/done/error）。逐分片用 HTTP `Range` 从 `.part` 大小续传；**短读保护**——流早闭或写入 < 预期则**不把 `.part` 改名为最终文件**，保留续传；重试带退避；只有完整分片才 `rename`。完成后重读 GGUF magic 校验。
- **本地扫描**（`scanInventory`）：递归走 `modelsDir`+`extraDirs`，跳过 mmproj、多分片只取首片、GGUF magic 失败丢弃；`routerId` = `modelsDir` 下首段目录名；从 header 取 `contextDefault/arch/hasVision`。
- **GGUF header 解析**（`gguf.ts`）：只读前 2MiB、不抛错的最小解析；`general.architecture`→arch、`<arch>.context_length`→ctx、`<arch>.vision.embedding_length` 或 arch 含 clip→hasVision。
- **删除带受管目录硬校验**（`deleteLocal`）：目标必须 resolve 到 `modelsDir/extraDirs` 内且 `.gguf` 结尾否则抛错；删全部分片；repo 目录无其它非 mmproj gguf 则整目录删（清 mmproj 残留）。这是后端唯一改数据的 CLI 路由 `models rm` 背后的安全栏。

### 5.6 本地端口暴露：127.0.0.1 vs 0.0.0.0

router 默认 `127.0.0.1`。切 `0.0.0.0` **强制 api-key**：`POST /settings/local-net` 对 0.0.0.0 + 空 key 直接 **400 `api_key_required`**。应用变更会**重启单 router**（新 `--host/--api-key` 立即生效）+ `invalidateAll` 重建 pi 会话。**自连接恒走回环**且内部调用者（pi、router 自己的 mgmt/health）都带 Bearer。这个设置只暴露 router 自带的 `/v1`，不会改变 core/Fastify 网关的监听地址；`GET /settings/local-net` 返回 `lanIp/apiKey/endpoints` 供其它设备拼直连 URL。

### 5.7 runtime 解析与安装

`resolve-llama.ts`：**只解析 llama.app 的统一 `llama`**（`resolveLlamaBin`：`EW_LLAMA_BIN` 显式 → 搜 PATH + `~/.local/bin` + 常见包目录，GUI 应用 PATH 稀疏故多搜几处）；返回二进制路径或 undefined。**经典每模型一进程的 `llama-server` 已完全移除**（含 brew 装的 llama.cpp）——本地推理（router）与嵌入子进程都只跑 `llama serve`。缺失时经 [llama.app](https://llama.app) 一键安装（`/local/install-runtime`）。
> **勿重新引入 node-llama-cpp，也勿回退每模型一进程的经典 llama-server（已完全移除）。** 本地推理只走 llama.app 统一 `llama` 的 router 模式。

## 6. 记忆系统（作用域化分层 + 渐进式披露）

### 6.1 作用域 × 层 + 可见性

- **作用域**：`global`（所有对话共享，"关于你"）+ `ws:<projectId>`（每工作区私有、互相隔离，"关于这个工程"）。
- **层**（按作用域不同）：全局 Core Memory = `user-profile / agent-notes`；工作区 = `conventions / decisions / pitfalls`。自动 Extracted Facts 用同一事实层但保持 `derived + sourceThreadId`，不进入常驻 Core Memory manifest。
- **`visibleScopes(scope)`**（`memory.ts`）决定会话**看到什么**：全局会话只看 global；**工作区会话看自己的 `ws:`（3 个工作区层）+ global 的 `user-profile`（只读叠加）**——这样项目里也知道"你是谁"，又不把项目约定泄漏到别的项目。**`visibleScopes[0]` 是写入目标**。

存储：`memory_items(id, scope, layer, session_id, origin, lifecycle_state, source_thread_id, text, embedding BLOB, updated_at, meta)`，每行可带 Float32 嵌入 blob（派生缓存）。`session_id` 暂为旧客户端兼容列；产品语义由显式的 `origin/state/sourceThreadId` 承载。

### 6.2 渐进式披露（清单 + recall_memory）

借鉴 Skill 的核心设计：

1. **清单（常驻索引）**：`buildMemoryManifest`（`ew-extensions.ts`）按可见 scope+层只列 curated 项的一行截断标题（≤80 字、每层最多 12 条），经 `before_agent_start` 钩子注入系统提示词。derived pool 不常驻；工作区会话给全局层加 `全局·` 前缀。
2. **按需全文**：`recall_memory` 工具按可见 scope 做语义/词法检索（`minScore:0.1` 去纯词法零分噪声），按分排序、去重、`topK`（默认 6）。

### 6.3 写入两路

- **Agent 主动（`manage_memory` 工具）**：`add/replace/remove`，`replace/remove` 按**子串 match** 定位（0 或 >1 命中报错）。新增事实写为独立的 `agent-managed/curated`；若 Agent 明确改写一个来源事实，该事实同时被提升为 Curated Fact。**每层字符上限**（Hermes 风）：接近上限时 `add/replace` **报错逼模型合并/删除**而非无声膨胀。
- **被动批量抽取**（非每轮）：`agent_end` 钩子把完成轮（含关键工具调用摘要 `[写文件 path]/[改文件 path]/[执行命令 cmd]`）转给 `ExtractionScheduler`（**被宿主 SessionHost 持有**，故跨 run 存活）。增量缓冲、≥24 轮立即 flush、否则 idle 90s debounce；失败 unshift 重试；关停前 flushAll。删除会话进入同一 thread 的 run 串行屏障，`discard` 清缓冲并等待在途抽取落定，再按 `sourceThreadId` 删除派生事实，避免迟到写入产生孤儿。抽取复用**当轮已加载的聊天模型**（temperature 0、json_object），按 scope 切 GLOBAL/WORKSPACE 提示词；模型不可解析则安全返回 `[]`。写入项显式为 `extracted/derived` 并记录 `sourceThreadId`；**取消的轮跳过抽取**。

### 6.4 混合召回 + markdown 真相源

- **混合打分**（`local.ts`）：取 scope∩layers 全部行 → 嵌入 query → sqlite-vec **cosine KNN** 取语义分 → 每行算 `lexicalScore`（token 重叠）→ **组合分 = 0.75·sem + 0.25·lex**（无嵌入则纯词法）→ `minScore` 下限 + `topK` 上限**防 context 稀释**。
- **markdown 真相源（仅全局）**：`user-profile.md / agent-notes.md` 是可编辑镜像（工作区记忆 DB-only）。DB→md：任何写/改/删后 `regenerateMarkdown`；md→DB：`syncFromMarkdown` 解析 id 回链并增量重嵌。旧 `skills.md` 不再读取，只保留原件与一次性 `skills.legacy-backup.md`。
- **嵌入是派生缓存、变更才重嵌**：write 总嵌；edit 仅 `patch.text` 变才重嵌；md-sync 仅变行重嵌；启用/切换嵌入模型时 `reindex` 批量补嵌（批 16）。
- **来源与生命周期**：`origin` 区分 `manual / agent-managed / extracted / imported / provider`，`lifecycle_state` 区分 `derived / curated`。共享 Zod 契约与 provider 写边界共同拒绝非法组合。`deleteBySession` 只删除仍由该 `source_thread_id` 拥有的 derived Extracted Facts；`POST /memory/:id/promote` 把事实提升为独立 Curated Fact，`POST /memory/:id/pin` 是用户“固定并保留”的同义入口；两者均清除来源关系并保留审计元数据。旧库启动迁移：有 `session_id` 的行归为来源事实，其余无法可靠区分旧写入方式的行安全归为 `imported/curated`。`deleteByScope` 删工作区时清整个私有池。
- **一致容量与注入安全**：curated 层使用 1375/2200 字符预算，derived pool 使用独立 4× 预算；HTTP、Agent、抽取、编辑、提升与 Markdown 回灌都在 `LocalMemoryProvider` 边界执行相同校验。常驻 manifest 与按需 recall 都用 persisted-data fence，derived fact 另带低权限/source 标签；凭证和指令注入文本在写边界拒绝。
- **旧层收口**：`agent-memory` 原地迁为 `agent-notes`；旧 `global.skills` 行迁入只读池后从 active memory 删除。程序性内容成为 `createdBy:migration` 的 pending candidate，事实进入 Agent Notes，歧义项等待人工处理；迁移有 disposition 标记并可重复启动。
- **外部 provider 只做 additive recall**：`AdditiveMemoryProvider` 总是先读写本地 provider；可选外部 provider 只贡献最多 4 条、单条 400 字、总计 1000 字的召回。可疑凭证/指令注入会被丢弃，其余标记 `origin:provider + untrusted + providerId`，`recall_memory` 用显式 untrusted fence 注入。外部 provider 当前只能通过 `CreateCoreOptions.deepMemoryProvider` 由宿主注入；`GET/PATCH /memory/provider` 只查询/切换已注入的附加层，不创建或保存配置。Desktop / CLI 没有接入入口，`Mem0MemoryProvider` 仍是适配骨架。

## 7. Skills 与候选学习

关键非显然事实：**有两套 skill 机制**。

1. **pi 自带 skills（agent 真正执行的）**：由 pi `DefaultResourceLoader` 扫描 agent 目录/cwd 的 `SKILL.md` 暴露给内核。全局来源包括 EasyWork 的 pi agentDir `~/.easywork/pi-agent/skills` 与 pi 标准用户目录 `~/.agents/skills`；项目级来源包括 cwd/祖先里的 `.pi/skills`、`.agents/skills`（需 trusted）以及包/设置/CLI 附加路径。EasyWork 只注入 `skillsOverride` 按名过滤禁用项（`excludeSkills`），变更即重建会话。
2. **应用内 `@ew/skills` SkillManager（UI 管理 + 备用 open_skill）**：自己实现渐进式披露——`discover()` 只扫**全局来源**并返回 `source` 元数据，Skills 管理页按“内置 Skills / 标准目录”分组；项目级 skills 仅由运行时按 cwd 发现，不显示在全局管理页。frontmatter `name/description/whenToUse`（必填）+ `version/allowedTools`（选填），靠零依赖 mini-YAML 解析；`open_skill` 工具按需读全文（第二层）。路由 `GET /skills`（返回 `skills/dir/sources`）、`/skills/:id/body`、`POST /skills/open|template`。

3. **Skill Candidate pipeline**：foreground `/learn`、受限后台 reviewer 与旧层迁移都只能写 `skill_candidates`。候选保存 status/scope/provenance/source conversations/evidence/model/完整 package/validation/content hash，并通过 API/UI 暴露全 package unified diff；验证 frontmatter、Verification、包内/内联引用、路径与 symlink confinement、声明工具、凭证、指令注入、数据外传、不可见 Unicode及文件数/字节上限。批准时重新验证并对跨平台规范化后的整个 package 做 optimistic locking，临时目录原子替换到全局或 workspace `.agents/skills/<slug>`，随后 discover + invalidate sessions；拒绝不触碰目录，删除最后来源会删所有未批准 candidate。

4. **学习与维护**：`POST /skill-learning/prepare` 把 text/conversation/confined path/SSRF-safe URL 组成普通 Agent turn，`stage_skill_candidate` 只暂存。后台 coordinator 只接收冻结 trajectory + 有界 Skill package catalog（优先成功加载的 Skill，再看同 scope umbrella/support files），无工具或副作用；取消、失败未恢复、低信号和 secret-bearing 轨迹跳过。批准后的 `learned_skills` 只在成功读取 Skill 后计 use，并记录 outcomes/patch；修正和验证失败可产生绑定整个 package hash 的 patch candidate。确定性 30 天规则执行 active→stale→recoverable archive，变更前快照并返回人类可读报告；pin 与 `createdBy:user` 永不自动迁移，snapshot/restore/rollback 可用。consolidation 默认关闭；开启后以指定 learner model 或最近聊天模型做 dry-run，仍只能产生待审核 patch。

## 8. MCP（`packages/mcp/`）

- **配置**：`McpServerConfig = {id, displayName, transport, enabled}`；transport = stdio `{command, args[], env?}` 或 http `{url, headers?, useOAuth?}`。工具命名空间 **`mcp__<serverId>__<toolName>`**。
- **连接**（`connect.ts`）：**动态 import** `@modelcontextprotocol/sdk`（测试/无 SDK 环境可注入）；stdio→StdioClientTransport，http→StreamableHTTPClientTransport；`callTool(name,args,signal)` 把 AbortSignal 透传进 SDK。
- **安全/探测/cooloff**（`manager.ts`）：**stdio 默认禁用**（跑任意本地命令），仅 `EW_ALLOW_STDIO_MCP=1` 开；probe 用 `withTimeout`（15s，`.finally(clearTimeout)` 不泄漏定时器）；失败 cooloff（普通 60s / OAuth HTTP 300s），cooloff 期内返回**缓存**工具列表不破坏注册表；`callTool` 先按缓存的 `inputSchema` 轻量校验参数、再扁平化 MCP content 为模型可读字符串。
- **桥成 pi customTools**（`toolProvider`）：每个启用、非 cooloff 的工具变 EW `Tool`（`requiresApproval:"first-use"`）。`!config.enabled` 的服务器**贡献 0 工具**（`listTools`/`toolProvider` 双重门控），改 enabled 经 `invalidateAll` 重建会话即从 customTools 移除；UI 端（`Mcp.tsx`）相应**只探测已启用服务器**、禁用项显示「已禁用」而非沿用旧探测的「已连接」。**关键 signal 细节**：`execute` 用**每次调用的 `exec.signal`**（pi 经 toPiTool 传入），而非 provider 级永不 abort 的占位 signal——否则取消/超时无法中断在途 MCP 调用。
- **路由**：`GET/POST/DELETE /mcp/servers`、`POST /mcp/probe`、`GET /mcp/servers/:id/tools`。**任何 server 变更 `invalidateAll`** 重建会话刷新 customTools。`mcpServers` JSON 批量导入在 **UI 端**翻译成逐个 upsert（无服务端 import 路由）。

## 9. `/v1` 网关（OpenAI + Anthropic）

`registerOpenAICompat`（`openai-compat/router.ts`）挂载，目标：把 Claude Code / openai SDK 指向 `http://127.0.0.1:<port>/v1`。端点：`/v1/models`、`/v1/chat/completions`、`/v1/messages`（Anthropic）、`/v1/embeddings`。这条路径是模型兼容网关：云端分支会复用 `SessionHost.streamCloud/completeCloud` 这两个无会话推理 helper，但不会调用 `SessionHost.run` 或创建 `AgentSession`，因此不自动获得 thread、记忆注入、Skills/MCP 或审批流。

**二级路由（`model` 字段是通用二级路由器）**：

```
请求 model →
  ├─ 本地已加载？(localBaseUrl(model) 命中)
  │    → proxyToLocal：把原始 body 转发到 router 的原生 /chat/completions 或 /messages，
  │      字节级流回，绕过我们的翻译层（`llama serve` 因 --jinja 原生支持两种协议含 Anthropic tool_use）
  ├─ 云端模型？
  │    → cloudStream/completeCloud → pi-ai streamSimple/completeSimple
  │      （经 pi 统一 ModelRegistry/AuthStorage 继承 OAuth/原生 Anthropic 鉴权；非云端返回 null）
  └─ 回退 → registry.resolve(model)（解析不到 404）
```

**pi ↔ ChatStreamEvent ↔ 协议翻译**（`pi-adapt.ts` + `translate.ts` + `anthropic.ts`）：把 pi 事件流**翻译成我们的 `ChatStreamEvent` 一次**，再复用 `streamEventToOpenAIChunks` 与 `AnthropicStreamTranslator`——**一个输入流 → 两种协议输出**。pi 工具调用是原子交付（参数一次性 JSON.stringify 成一个 delta）。

**错误帧不可伪装 end_turn**（正确性约束 #2）：OpenAI 侧中途 error 发可见 `{error:{type:"upstream_error"}}` 帧而非静默截断；Anthropic 侧 `AnthropicStreamTranslator.errored=true` 后 `end()` **只发块关闭、不发 `message_delta/message_stop`**——否则会把错误伪装成成功 `end_turn`。

`GET /models` 回 `endpoints`（router 直连 baseUrl）+ `bindHost` + `context`；`GET /settings/local-net` 另回 `lanIp/apiKey/endpoints`。`/v1/models` 只返回 OpenAI-shaped 模型列表，不承载这些内部管理字段。

## 10. CLI —— `easywork`

SEA 产物是单二进制，**既是守护（`serve`）也是瘦终端客户端**，经 `@ew/sdk` 打 HTTP，**后端零改动**（唯一例外：`models rm` 的 `POST /models/local/delete`）。macOS DMG 与 Windows x64 NSIS/MSI 都把它作为 desktop 私有 sidecar 资源，并不会自动安装到用户 `PATH`；从源码使用 CLI 需先构建 daemon，再执行 `node apps/daemon/dist/cli.js`。

- **命令**：无命令 + TTY→`repl`；`serve/status/stop`；`models [ls|pull|rm]`、`thread [ls|show|rm]`、`mem [ls|search|rm]`；`run <prompt>`；`repl|chat`。选项 `-m/-w/-t/-y`，环境 `EW_BASEURL/EW_TOKEN`（连远端、抑制自启）、`EW_MODEL`。
- **守护发现/自启**（`cli/daemon.ts`）：读 `~/.easywork/daemon.json`（`{baseUrl,token,pid}`）→ **HTTP 探活 `/health`（1.5s，而非信 pid，因文件易 crash-stale）** → 没活且 autostart 则 detached spawn `serve`、轮询直到 20s。`EW_BASEURL` 时永不自启。
- **SSE 渲染**（`cli/agent.ts`）：**约定——助手 `text` → stdout（可管道捕获）、所有装饰（工具/思考/状态）→ stderr**。审批：`--yes` 自动 approve，否则提示 `y/n/a`。Ctrl-C 中断本轮。
- `run` 在**没有位置参数 prompt 时**支持 stdin 管道作提问；若两者同时存在，位置参数优先、stdin 不读取。`repl`/`run` **每轮只发当前行**，靠守护按 threadId 重建上下文。`models pull` 流式进度、`pickVariant` 偏好 `Q4_K_M`。

## 11. IM 连接器

`@ew/im-connectors` 当前的主接口是 **Channel Gateway**，而不是每个平台在 core 里各接一遍。

- **`ChannelAdapter`**（`adapter.ts`）：平台 adapter seam，`start/stop/send/handleWebhook?`，将平台消息归一成 `InboundMessage`。
- **`ChannelAdapterRegistry`**（`registry.ts`）：注册平台 adapter；当前内置 Telegram、Feishu/Lark 与 WeChat iLink，后续 Discord/WeCom 在这里扩展。
- **`ChannelGateway`**（`gateway.ts`）：托管连接器配置、运行状态、生命周期、allowlist、webhook 分发和 `ChannelTarget` 透传。
- **`ConnectorHost`**（`host.ts`）：把入站消息接到同一个大脑：`resolveThreadForChannel(channel, channelUserId)` 映射渠道身份→稳定 thread → 载历史 + 追加用户消息 → 跑 agent → `AgentEvent`→`OutboundChunk` → `reply` → 落库助手消息。
- **`ChannelOperations`**（`packages/core/src/channels/operations.ts`）：core 侧应用层边界，聚合 gateway/host 与 core-only 状态：连接器 CRUD/启停、Feishu/WeChat QR setup session、inbox read model、`/inbox/events` SSE invalidation、core stop 时 abort 未完成 setup。`routes/channels.ts` 因此退化成薄 HTTP adapter，不再直接编排 gateway 和扫码会话。
- **`ChannelSecretStore`**（`packages/core/src/channels/secret-store.ts`）：保存每个 connector 的完整 secret map。创建/扫码先写安全存储再持久化去密配置；旧 SQLite 明文只在安全写入成功后擦除。API 读取只返回已配置字段名，空 secret 表单表示保留，删除连接器同步清理安全存储。

管理面都走 daemon Bearer；webhook 入口不走内部 Bearer，而是交给 adapter 做平台级校验。core 只捕获 32MiB 内 raw body，不把平台 webhook 当内部 API 认证入口。Feishu/Lark 的默认连接不需要 webhook：`/im/feishu/register` 负责启动官方 SDK 扫码注册，确认后自动保存 `transport:websocket` 连接器；WeChat 的 `/im/wechat/register` 复用同一 setup session 语义完成 iLink QR 登录。取消或 core stop 会 abort 未完成注册，避免取消后继续落库。设置页的渠道类型从 `/im/adapters` 元数据生成，只暴露已注册的平台，避免用户保存未实现 adapter。

**已实现 = Telegram adapter + Feishu/Lark adapter + WeChat iLink adapter**。Telegram 走纯 HTTP Bot API long-poll；多数 IM 不能逐 token 流，所以回复先聚合再发，停止走 `AbortController`，保存/删除/退出不等待默认 25 秒轮询自然返回。Feishu/Lark 默认走官方 SDK WebSocket 长连接，设置页提供扫码创建/授权应用，不要求公网地址；高级 webhook 模式继续支持 URL verification、Verification Token、`X-Lark-Signature`、Encrypt Key 加密回调解密、`im.message.receive_v1` 文本事件归一化与 `tenant_access_token` 文本回复。Feishu/Lark adapter 在非 `transport:webhook` 时拒绝 public webhook；webhook 模式必须配置 `verificationToken` 或 `encryptKey`，否则 401。WeChat 对齐 Hermes 的腾讯 iLink Bot API：`/im/wechat/register` 扫码拿 `accountId/token/baseUrl`，adapter 通过 `getupdates` long-poll 收文本消息，回复走 `sendmessage` 并回传 peer 的 `context_token`；sync buffer 与 context token 落本地状态文件。WeChat 群聊默认关闭，因为 iLink bot 身份是否收到普通群事件取决于腾讯侧。**WeCom/Discord 待补**。

## 12. 桌面 UI（`apps/ui`，"Agent Tasks" 设计）

**瘦客户端**：零大脑，全部经 `@ew/sdk` 的 HTTP+SSE 打守护。同一 bundle 跑浏览器（dev）与 Tauri 壳。

### 12.1 设计语言 + 主题 token

- 字体：IBM Plex Sans（UI/prose）+ JetBrains Mono（机器数据：分支/时间戳/token/diff 统计/CWD/模型名），`@fontsource` 内置离线。
- **Tailwind v4 `@theme` + 别名层**（最重要的样式架构）：`@theme` 定义深色默认 `--color-*` token（取自设计稿）；**单一强调色固定蓝**（accent 切换已移除，只留明暗）；**别名层**把新旧两代命名（`--bg-elev/--tx-0/--prose`、legacy `--bg/--surface/--text/--accent/--ok/--err`）重映射到 `--color-*`。因 `var()` 在使用点解析，**一处 `[data-theme="light"]` 覆盖 `--color-*` 就级联到所有别名**，存量组件自动换肤（浅色刻意保留终端/代码井深色）。
- `applyTheme()` 设 `<html>` `data-theme`，`system` 读 `prefers-color-scheme` 并实时订阅；`main.tsx` 在 render 前应用避免首屏闪烁；prefs 存 localStorage。

### 12.2 外壳（App.tsx）

- **两段式 Titlebar（46px，无下边框、与下方内容同底色无缝）**：段 A 宽 = 实时侧栏宽（右边框与分隔线像素对齐）+ macOS 红绿灯让位（`--ad-traffic-light-safe-x: 88px`）+ 侧栏开关；SideDock 放大时只覆盖标题栏下方的工作区，已打开标签、`+`、放大与抽屉按钮继续留在段 B 同一行。段 B 还承载面包屑（任务名 + 工作区/分支 pill；空间不足时由标签区收缩）与工作台开关（动态图标，仅聊天/工作区会话显示）。Tauri 拖拽区必须标在实际命中元素上：标题栏非交互容器、任务名、spacer、项目/分支 pill 及其内部文本 / 图标，以及 portal host / 标签包装间隙都带 `data-tauri-drag-region`，交互按钮不带。
- **展开式侧栏**：快捷操作（新对话 ⌘N / **搜索 ⌘K** / 新建工作区 / 收件箱）+「项目」折叠组（CWD 角标 / hover 新建会话 ＋·文件树·删除 / 分区头「折叠全部」`toggleAll`）+「对话」分区（相对时间）+ 底部设置 + 连接状态点。首页/侧栏的「新建工作区」调用无 `workspaceDir` 的 `POST /projects`，由 daemon 分配数据目录下的 `workspace/NewProjectN`，随后直接进入空白 `.ws-hero`；它不触发系统目录选择。`ContextBar` 项目菜单的「打开文件夹」是独立流程，只有这里才调用 `pickWorkspaceDir()`，取消选择不再追加确认或创建项目。可拖拽列宽（200–460，持久化）。channel threads 不出现在普通对话分区和 `SearchPalette`，统一进入收件箱。**全局搜索 `SearchPalette`（⌘K，App 全局 keydown）**：居中浮层跨 对话/工作区/工作区会话 模糊匹配，↑↓/Enter/Esc。注意 eyebrow 控件类名勿用 `row`（命中全局 `.row > button` 主按钮样式）。
- **收件箱 `Inbox.tsx`**：基于 `GET /inbox/threads` 的只读聊天优先视图——左侧渠道会话队列（搜索 + 全部/运行中/未运行筛选，可拖拽宽度并持久化），右侧消息时间线（读取 `/threads/:id/messages` 的 `StoredMessage[]`）；打开页面时订阅 `GET /inbox/events` SSE，收到 `changed` 后重新读取 read model，不做固定间隔轮询。身份 / 模型 / 同类连接器状态进入按需右侧抽屉，窄屏切成上方会话队列 + 下方消息流。展示层会把 opaque channel id 降级成「微信联系人」等友好标题，预览清洗 Markdown 标记，助手消息按 Markdown 渲染；手动回复和暂停自动回复暂不伪实现，只保留禁用控制位。
- **dockOpen 是 App 级共享态**，切模式/会话/工作区时重置（面板不跨会话"跟着"）。
- **SideDock 工作台**：应用标题栏右端直接承载**已打开视图标签 + `+` 视图菜单 + 放大 + 抽屉开关**，标签与抽屉按钮严格同一行，没有抽屉内标题栏或第二层模式栏；SideDock 通过标题栏的稳定 host portal 渲染 chrome，标签状态仍封装在 SideDock 内。初始只打开当前上下文默认视图（工作区=改动、对话=文件）；每个标签可独立关闭，关闭当前标签后选择相邻标签，关闭最后一个标签即收起抽屉，再次打开恢复默认视图。`+` 菜单按需增加改动（仅工作区）/ 文件 / 浏览器，以及 Desktop runtime 可用时的多实例终端，窄屏向左展开避免越界。终端标签不是 Agent 工具日志的命令回放：Tauri Rust 用 `portable-pty` 启动用户默认 shell，xterm 负责输入、ANSI 渲染和 resize；工作区 cwd 是项目根目录，对话 cwd 是会话工件目录。PTY session 由应用进程按 scope 持有，隐藏抽屉 / 切换标签或任务不销毁，WebView reload 后按 scope list + attach 恢复 2 MiB 有界输出快照；关闭标签才结束进程，Unix 发现前台进程组时先确认，Windows 在 shell 有仍存活的后代进程时确认，空闲 shell 可直接关闭；应用退出 `close_all`。Agent `bash` 继续走 `SessionHost` 审批并只渲染在工作日志，双方不共享 stdin/stdout。外部文件卡和消息链接会自动增加并激活对应标签，重复点击同一链接仍会重新导航。各视图动作归属自己的内容头部：文件列表负责打开目录 / 刷新，改动视图负责统计 / 刷新；浏览器提供可编辑地址栏，裸域名补 `https://`，地址栏与外部导航统一只接受 http(s)，自定义地址与消息链接共用同一 iframe，切换标签不丢当前地址。HTML 文件不进入 FileViewer：交付卡或文件列表点击后读取受控文件内容，直接作为 Browser page 在浏览器标签以 sandbox `srcDoc` 打开。宽屏下作为 320–760px 可拖拽、localStorage 持久化的右侧列；≤1100px 时保留标题栏入口并切成右侧浮层。非 HTML 文件模式在普通侧栏采用主从导航：列表选中文件后由详情接管正文，FileViewer 自己的单一工具栏提供返回；放大态切成左侧独立滚动文件导航 + 右侧独立预览。
- 主区按 `mode` 切换 Chat（按 threadId 重挂载）/ Workspace / FilesPage / inbox 占位；**设置为整页内嵌**（非弹层）。`.set-page` 用 `position:absolute; inset:0; z-index` **覆盖整窗（含标题栏）**——否则上一页的标题会在顶部露出；桌面端 `.set-nav` 顶部留白让位红绿灯 + `data-tauri-drag-region` 保留拖拽。打开设置时 `.ad-body` 保持挂载、仅 CSS 隐藏（`display:none`），避免卸载 Chat/Workspace 而中断在途流式运行。
- **设置 page-host**：`SettingsHost`（`apps/ui/src/settings/SettingsHost.tsx`）封装 section registry、visited keep-alive、上次分区 localStorage、`ew:open-settings` 定向打开和整页覆盖布局；`App.tsx` 只调用 `settingsHost.open/openSection/close`，不再直接持有设置页运行态。
- **⌘N** 全局 keydown 新建对话。

### 12.3 Chat vs Workspace + SSE

共用 MessageStream / SideDock / ModelSelect / composer / 审批卡 / **斜杠命令面板** / **运行态上下文圆环**。两侧 composer 的 pill、模型、审批与附件状态统一无边框，以填充色、图标和文字表达状态；输入卡外框仍负责聚合整个输入区域。
- **Chat**：composer 输入卡顶部用 `ComposerContextStrip` 前置本轮能力开关 **思考 / 联网**；**模型 / 上下文压力**移到底栏发送按钮左侧，作为发送前确认区。上下文压力默认只呈现环形进度，不常驻显示数字；悬停或键盘聚焦后通过自绘 tooltip 展示百分比与 `prompt/context` token 明细。模型下拉消费 `/models.modelSources`，按 **本地模型 / provider id** 分组展示；provider 分组已经表达来源，条目只显示模型名，避免重复铺开 raw id。底栏左侧 `+` 仅做**上传图片**，右侧保留模型 / 上下文 / 发送或停止。默认采样参数从输入框移出，统一在模型页按本地模型配置。普通对话运行前后对专属工件目录做有界快照，成功提交时把最终仍存在的新增/修改文件作为 `StoredMessage.artifacts` 挂到对应助手轮次，并发送 `artifacts` 事件即时更新；消息下方「本轮交付」卡显示文件类型、状态与大小，点击复用 SideDock 文件预览。该快照不扫描工作区仓库，工作区改动继续由 Git 汇总卡与 diff 视图承担。
- **Workspace**：`ContextBar` 显示项目 / 分支 / 思考；composer 底栏与 Chat 对齐——左侧 `+` 后紧跟**审批策略 pill**（中文档位 只读/逐项确认/自动编辑/完全访问，full-auto 橙色警示；改档 PATCH `project.approvalMode`，`send()` 前 await 在途 PATCH 防"切档即发"）与附件状态，右侧是**模型 / 上下文圆环 / 发送或停止**，复用同一悬停详情。**空态居中**（`msgs.length===0` 渲染 `.ws-hero`：品牌标 + 时段问候语 + 居中限宽 composer，否则消息流在上、composer 在底）。SideDock 带 git 上下文；mutating 工具后刷 git + ws 文件 + 上报分支给标题栏。
- **审批卡**（`.approval-wrap`）：危险工具挂起时在 **composer 正上方内嵌弹出**（与输入框同宽、从下滑入），非遮罩弹层——不挡对话；含工具名 + 命令 JSON + 拒绝/本会话总是允许/允许。Chat 与 Workspace 一致。
- **斜杠命令**（`lib/slash.ts` + `components/SlashPalette.tsx` 的 `useSlashPalette` hook，两 composer 共用）：输入「/」弹两阶段自动补全（命令名→参数），面板头显示当前阶段，列表右侧直接带**当前值 / 当前项**；`/compact` 还会显示当前上下文占比。`onKeyDown` 优先消费 ↑↓/Enter/Tab/Esc。支持 `/think <档位>` 设思考、`/model` 先选本地/provider 来源再选该来源下模型（下一轮 run 带 provider-scoped modelId，复用 getOrCreate 重建保上下文）、`/compact` 调 `POST /threads/:id/compact`。
- **思考分级**：思考状态统一以前置 pill 呈现（关/低/中/高，点击循环）+ `/think`；`thinkingLevel` **按 provider-scoped route id 持久化**。无偏好时，`modelSources.reasoning=true` 的模型默认「中」，其它模型默认「关」；显式关闭同样保存，run 时随 `runAgent` 下发。
- **SSE 处理**：`runAgent` 流 → `usage`(驱动环)/`approval-request`(审批卡)/`retry`·`compaction`(状态条瞬态提示，有新 text 即清)/`final`/`error`/其余（含 `artifacts`）→`applyAgentEvent` reducer。`AbortController` 卸载或停止时取消（后端回滚 + 不落库，UI 标"已停止·本轮不计入上下文")。**图片**经 FileReader→base64→`{type:"image",mimeType,data}` 内容片段。本地模型默认采样由 daemon 侧模型设置注入，前端普通发送不再带采样参数。
- **ContextRing / Usage pill**：20px SVG 环包进 `ComposerUsagePill`，统一显示 `promptTokens/contexts[model]`；accent → 琥珀 >65% → 红 >85%，聊天与工作区复用同一视觉语义。

### 12.4 MessageStream

用户右对齐气泡；**助手无逐行头像、纯 prose**（react-markdown + remark-gfm + rehype-highlight，外链改路由到 dock 内嵌预览而非跳走 webview）。按有序 `blocks`（reasoning|tool|text）保留真实交织。**行内工具调用（Codex Flat：`<details>` 扁平左竖线、过去式动词、零卡片零暗井、默认折叠运行中展开）**：`groupExplore()` 把连续只读勘探（`isExploreTool`：读/搜/列/找，不含 explore_web/编辑/运行）**聚合成「探索 · N」组**，过去式步骤（已读取〔徽标+文件名+目录〕/已搜索/已列出/已查找）挂左竖线；思考左竖线换 accent；编辑（已编辑〔徽标 + 文件名亮/目录灰 + `+/-`〕）展开 `editPreview`→`DiffLines`（**`highlight.js/lib/common` 逐行语法高亮**复用 `.hljs-*` + 双栏行号〔`@@` 解析真实行号、合成 diff 从 1 起〕+ 改动行红/绿竖条；diff 载荷缺失时从 args 合成 patch / old+new / 仅 content）；运行（`SquareTerminal` + 已执行 + 折叠态命令预览单行省略）展开浅底圆角卡〔`$ 命令`悬挂缩进换行 + 灰输出同卡〕；explore_web 走 favicon 来源 chips。**diff 统计**：`lineDiffStat`（滚动 Int32Array LCS，`n*m>250_000` 退化行数差防流式卡顿）、`diffStat`（优先 unified、否则 before/after）、`editStat`（str_replace 行级 diff 防虚高）、`aggregateEdits`（按路径合并、过滤 `+0 −0` 幽灵）。**文件改动汇总卡**（`<details>` 默认折叠）点击跳 dock 对应文件 diff。**工作日志**：渲染时按「最后一个过程项（探索/思考/非文本工具）」下标把本轮拆成 过程 + 最终答复——过程包进 `<details className="cv-worklog" open={live}>`（`fmtWork` 算「已工作 N 分 M 秒」，`m.start`/`m.end` 由 run 收尾盖时），最终文本留在容器外；纯文本答复（无过程）不套壳。助手操作行带**时间戳**（`m.end ?? m.start`）。**滚动到底浮钮**（`.jump-bottom`，`onScroll` 算离底 >80px 则现；自动滚动改为仅 `atBottomRef` 为真时跟随，尊重上滚位置；Chat/Workspace 各自接，按钮挂在 composer 内并锚定输入框右上方）。**审批卡**抽成共享 `ApprovalCard`（简洁单头行 + 单行参数预览，`argPreview` 取 command/path/紧凑 JSON）。
- **代码块**（`pre` 覆写 `CodeBlock`）：顶栏语言标签 + 复制（`codeText` 递归取高亮 span 树纯文本作复制源）；内联代码不受影响。
- **消息操作行**（移到消息下方，取代右上角悬浮）：助手下方「复制」整条；用户**最后一条**下方「编辑」+「重试」。
- **重新生成**（重试 / 编辑共用 `regenerate`）：UI 替换旧答案（非追加）、composer 不动；`history` 始终带本轮用户原文（后端据 `history` 末条取 text/images）；编辑则更新末条用户气泡文本。后端 `SessionHost.rollbackLastUserTurn` 用 pi `navigateTree` 回滚到上一轮用户消息的父节点 → 旧问答另起分支、不再进上下文（含 JSONL/resume 正确），失败兜底内存截断。

### 12.5 统一文件预览 FileViewer

一个 `<FileViewer source>` 组件按 `kind` 选渲染器（开闭：加类型=加分支），统一工作台「文件」tab 与项目文件浏览页 FilesPage 的预览：
- **工具栏所有权**：文件名、大小、预览 / 源码、复制 / 下载都只由 FileViewer 渲染；SideDock 普通详情可注入一个返回文件列表动作，但不再额外包文件标题栏。
- **数据源四态**：`fs`（工作区/会话文件，走 `/files/meta` + `/files/raw`）/ `text`（已有文本）/ `url`（网页）/ `bytes`（消息图片 base64）。
- **类型**：文本·代码（highlight.js 高亮）/ Markdown（渲染 ⇆ 源码）/ 图片（鉴权 fetch→blob URL）/ SVG（渲染 ⇆ 源码）/ PDF（`<iframe>` 浏览器原生）/ HTML（沙箱 iframe ⇆ 源码）/ 二进制兜底下载。不做音视频。
- **鉴权字节**：daemon 用 Bearer，`<img>/<iframe>` 不能带 header → SDK `fileBytes()` 用 fetch 取 Blob → `useBlobUrl` 的 `createObjectURL` 当 src，卸载/换 key 时 revoke。
- **后端**：`/files/meta`（类型判定 + 文本类内联）+ `/files/raw`（原始字节 + `Content-Type`），`scope=workspace|chat`，复用 `readFileSafe`/`readRawSafe` 路径限定；`resolvePreviewKind`/`mimeForName`（`@ew/shared/preview`）前后端共用判定。旧 `/workspace/:id/fs/read`、`/chat/:threadId/file` 已被它取代移除。

### 12.6 设置（SettingsHost page-host）

整页内嵌（非弹层），左导航 6 项：**通用 / 模型 / 渠道 / Skills / MCP / 记忆**。`SettingsHost` 维护 section registry、visited keep-alive、上次分区和定向打开契约；左导航宽度 = 主侧栏 `sessionWidth`（经 `navWidth` 传入，分割线与默认页对齐）。
- **统一外壳**：`.set-main` 顶部一个共享 `.set-phead`（大标题 h1，由 Settings 集中渲染）+ `.set-mbody`（各 section body）；横向内边距统一用 `--set-x: clamp(24px,3.2vw,56px)`（标题与内容对齐、随窗口自适应、切 tab 不跳动）。模型/Skills/MCP 原本无标题、记忆原本是「图标+副标题」头，现统一为纯大标题。
- **两类区**：通用是**卡片行**（`.set-group`/`.set-row`，标题+说明左、控件右，ZCode 式对齐）——界面主题使用**自绘下拉**（`AppearanceSelect`），HF 镜像使用持久化 `.set-toggle`，切换后搜索与全部 HF 下载立即共用新来源；模型 / 渠道 / Skills / MCP / 记忆五个管理页以 **lazy keep-alive 内嵌**（访问过的 `.set-pane` `display:none` 保活，避免连接或状态刷新中断）。**网络访问**（router 暴露到局域网 `.set-toggle` 开关 开=0.0.0.0/关=127.0.0.1 · API Key · 已加载端点 · 0.0.0.0 警告）放在**模型页（本地 tab）顶部**——它管理的是 llama router 及其原生 `/v1` 直连端点，不改变 core 网关监听地址。**向量召回**控件原独立「向量记忆」页已删除——记忆页（`MemoryOverlay`）把向量 / 词法召回状态与宿主已注入的 Additive Provider 收成紧凑的 `.mem-runtime-statuses`，未启用时仍可就地下载 nomic 并重建索引；记忆页不负责创建 Provider 配置。
- **记忆（卡片信息流，`MemoryOverlay`）**：顶部工具栏维持“搜索为主、添加为主动作”，中间紧凑状态组常驻显示向量 / 词法召回，Additive Provider 仅在宿主实际注入后显示状态与开关；当前没有前端接入表单，因此默认场景不暴露“未配置”死状态。窄屏允许状态组换行而不挤压搜索。下方**筛选 chips**——作用域单选（`scopeFilter`：`all` / `global` / `ws:<id>`，带计数），选中具体作用域时分隔线后再现该作用域的**分类层 chips**（`layerFilter`，语义色点；「全部」视图不按层筛避免跨作用域层语义混淆）。旧版 Skill 迁移审计复用 `ConfigDisclosure` 作为次级区域：无歧义项时折叠并只显示完成摘要；有歧义项时自动展开、显示 warning 数量和明细。**单列卡片流** `feed`（按作用域/分类/搜索过滤、时间倒序）：每卡 = 文本 + 元信息行〔作用域 pill（👤全局/你 或 📁工作区名）· 分类色点+标签 · **来源徽章（按显式 `origin/state/sourceThreadId` 呈现手动、Agent 管理、自动提取、既有 / 导入或外部 Provider；已提升的提取事实标为已确认）** · 相对时间〕+ hover 编辑/删除（行内）。`添加` 智能定向：具体作用域+层已筛则直达，否则弹层自选 scope/层。空态居中提示。
- **模型**：本地/云端分页；本地按 kind（文本/嵌入/视觉）显示，load/unload 或"启用向量"，文本/视觉模型卡片可展开**运行参数**面板（预设 + `temperature/top_p/top_k/min_p/repeat_penalty/max_tokens`，空值=引擎默认；保存到 `models.local.settings` 并由 `SessionHost` 注入聊天/工作区/渠道默认采样），**hover 显形删除钮**（删的若是当前向量记忆引擎模型→后端 `/models/local/delete` 一并停嵌入进程 + 清持久化设置）；嵌入模型删除分级提示；无 llama 二进制时一键安装 banner；HF 搜索下载（流式 %），搜索异常显示实际 HTTP 错误并引导到镜像开关，不再把失败伪装成空结果。云端页每行两个服务商卡片，内置目录与自定义入口分开；点击卡片进入配置，支持自绘 API family 选择、标准 `/models` 探测、逐模型 ID/上下文/模态/推理覆盖和跨协议目录模板绑定，已配置卡片只显示服务商摘要并提供编辑/删除。
- **渠道**：展示 registry 已注册 adapter，支持连接器创建、启停、删除，以及 Feishu/WeChat 扫码 setup 流程；状态由 `ChannelOperations` 提供。
- **Skills**：工具栏只承载“已启用 / 待审核 / 已归档”导航与打开目录、学习、新建等主操作。自动学习移到独立 `ConfigDisclosure`：折叠摘要常驻启用 / 运行 / 上次结果，展开后用两列响应式网格配置自动检查、工具调用阈值、学习模型与智能合并提案，900px 以下退化单列，1280px 桌面视口无横向溢出；立即检查、确定性维护与合并预览留在面板底部。Skill 卡展示启停与 learned 遥测，并提供固定、反馈、版本快照和可恢复归档；Candidate 详情承载 scope、来源 / 证据跳转、验证报告、正文修订与 diff 后批准。
- **MCP**：server 列表自动探测 + 增删改导入，管理页继续遵守同一设置外壳和 keep-alive 约束。

### 12.7 统一弹层 + 文件类型体系 + Tauri 规避

- **渐进披露**：`ConfigPrimitives.tsx` 的 `ConfigDisclosure` 提供统一的摘要按钮、`aria-expanded` 与按需内容区，供 Skills 自动学习和记忆迁移审计复用；它是页面内层级组件，不是遮罩弹层。
- **统一弹层**：删除确认 / 文本输入 / 列表选择共用 `.confirm-mask`/`.confirm-box` 外壳——`useConfirm()` hook（promise 化、重入放弃前一个防泄漏）做确认（模型/MCP 删除）；`.confirm-box.wide` 做输入（记忆添加）。**替代 Tauri WKWebView 不可靠的 `window.confirm`/`prompt`**（不阻塞、点一下即"确认"）。
- **文件类型体系**：`lib/filetype.ts` 统一扩展名→`{label,color,Icon}`（工具行/文件树/汇总卡共用）；`BY_NAME` 处理整名配置（Dockerfile/.gitignore→GIT，避免 `.gitignore`→GITI）。SideDock 的文件详情与放大双栏都使用完整剩余高度，HTML/PDF iframe 不再只占窗口上半部。新建技能等改**行内输入**（桌面走 Rust 原生目录选择）。

### 12.8 瘦客户端连接 + Tauri sidecar

连接解析优先级（`client.ts`）：Tauri runtime config（守护每次随机端口，不可持久化）> URL `?baseUrl=&token=`（持久化到 localStorage）> localStorage > `window.ewConfig` > Vite env / 默认 `127.0.0.1:8788`。**Tauri 壳启动时把守护当子进程拉起**（打包→Node-SEA 单文件 `daemon/easywork serve --port 0`，dev→`node $EW_DAEMON_ENTRY serve`），读其 stdout 首行 JSON `{baseUrl,token,pid}` 供 `get_config`；前端 `initRuntimeConfig()` 轮询拿到后 pin。真终端不走 HTTP daemon：`TerminalRuntime` 只在同时检测到 Tauri `invoke` + `Channel` 时可用，先从 daemon 的 `/terminal/context` 安全解析 cwd，再通过 `terminal_create/list/attach/detach/write/resize/close` IPC 管理 Rust PTY；有序高频输出走 Channel，生命周期只属于当前 Desktop 进程。WebView CSP 显式放行 `ipc:` / `http://ipc.localhost`、本地 daemon、data/blob 媒体和沙盒 frame，禁止远程脚本、object、form 与外部 `frame-ancestors`；HTML 文件预览保留受控 inline 能力。

## 13. 打包与发布

- **daemon → Node SEA 单文件二进制**（`scripts/build-daemon-sea.mjs`）：turbo build（SEA 内联各包 dist）→ tsup 全内联 CJS → `--experimental-sea-config` 生成 blob → 复制 node + postject 注入（macOS 必须先去签名、注入后 ad-hoc 重签）→ 捆 `sqlite-vec` 各平台 `vec0.{dylib|dll|so}`。所有 CLI 都通过 Node + 参数数组调用，避免 Windows `.cmd` 与带空格路径的 shell 转义问题；SEA 参数解析兼容 Node 24/26 的 argv 形态。**运行免 Node**。
- **llama runtime**：缺失时经 [llama.app](https://llama.app) 自动安装（`resolve-llama.ts` + `/local/install-runtime`）。

- **发布**：`v*` tag 触发 `.github/workflows/release.yml`，先用 `scripts/check-release-version.mjs` 校验 root npm、desktop npm、Tauri config、Cargo.toml/Cargo.lock 与 tag 一致；macOS-14（Apple Silicon）runner出 dmg，`windows-latest` 出 Windows x64 NSIS + MSI，均通过 SEA smoke 后发到公开 Releases（当前未做 Apple/Windows 正式签名；Intel/ARM64 Windows/Linux 后续）。

## 14. 数据存储总览

| 存储 | 内容 | 真相源 |
|---|---|---|
| SQLite `ConversationRepo` | 项目 / 线程 / 消息（含 FTS5 全文检索）/ 设置键值 | UI/检索/渠道映射/项目元数据 |
| 系统渠道密钥存储 | connector secret map（Keychain / Secret Service / DPAPI） | 渠道鉴权密钥；SQLite 仅存非敏感配置，API read view 动态返回字段名 |
| pi `SessionManager` JSONL | 每 thread"喂给模型的上下文"（含 compaction 状态） | 模型上下文（跨重启 resume） |
| `memory_items` 表 + 全局 `*.md` | 记忆（scope×layer，嵌入 blob 派生）；全局有 markdown 镜像 | 全局：markdown 可手改回灌；工作区：DB-only |
| `legacy_skill_memory` | 旧 memory-layer skills 的只读迁移池与 disposition | DB，永不进入 recall/manifest |
| `skill_candidates` + `learned_skills` + `skill_snapshots` | 待审核候选、已批准学习 Skill 遥测、可恢复快照 | DB 元数据 + 批准后的 `SKILL.md` package |
| `<table>_vec`（sqlite-vec vec0） | 记忆的向量查询加速结构 | 派生自 embedding blob，写/改/删时同步 |

**sqlite-vec 要点**：经 `node:sqlite` + `{allowExtension:true}` 加载；vec0 虚表 `distance_metric=cosine`，维度存 `<table>_meta` 跨重启；**rowid 必须 `BigInt`**；KNN 返回整索引（≤4096）由调用方按 scope 过滤；维度变更 drop+rebuild 从源 blob 重灌。**扩展为可选依赖**：路径给定则加载失败 fail-loud（视为打包 bug），路径缺失则降级纯词法。

## 15. 关键正确性约束（横切，务必遵守）

> tool-call 解析/交织、调用去重、max-iterations 由 pi 内核负责（自研 loop/healing 已删）。以下是宿主层必须守住的：

1. **每 thread 串行化 run**（promise 链）——pi `subscribe` 是会话级，并发会跨请求串流 + 审批错配。
2. **事件映射唯一边界**——`mapSessionEvent`（pi→SSE）+ `pi-adapt.ts`（pi↔OpenAI/Anthropic）。协议翻译器必须处理 `error` 并正确终止（**不可伪装 end_turn**）。
3. **工作区路径限定**——`escapesCwd` 经 realpath 解软链硬拦越界（所有审批档），bash 靠审批把守。
4. **0.0.0.0 暴露强制 api-key**——切换重启 router；内部回环调用一并带 Bearer；自连接恒走 127.0.0.1。
5. **SSE 健壮性**——所有写口 `raw.on("error")` + `writableEnded/destroyed` 守卫，避免客户端断开后 write-after-end 崩。
6. **记忆召回**——相关度下限 + topK 上限防稀释；markdown 真相源、embedding 派生（变更才重嵌）。
7. **sqlite-vec**——vec0 rowid `BigInt`；`cosine`；可选依赖，无二进制降级纯词法。
8. **个人微信只走 iLink bot**：扫码登录的是腾讯 iLink bot 身份，不是可任意脚本化的普通个人号；不要引入 Web 微信逆向。群聊默认关闭，按 iLink 投递能力渐进打开；企业微信仍走 WeCom。

  <script>
  (function(){
    var src = document.getElementById('src').textContent;
    var content = document.getElementById('content');

    // —— 渲染（marked 在线则用之，离线回退迷你解析器） ——
    function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    function renderMarkdownFallback(md){
      // 极简回退：标题 / 代码块 / 段落，保证离线也可读
      var lines = md.split('\n'), out='', i=0;
      while(i<lines.length){
        var l=lines[i];
        if(/^```/.test(l)){ i++; var c=[]; while(i<lines.length&&!/^```/.test(lines[i])){c.push(lines[i]);i++;} i++; out+='<pre><code>'+escHtml(c.join('\n'))+'</code></pre>'; continue; }
        var h=l.match(/^(#{1,6})\s+(.*)/); if(h){ var n=h[1].length; out+='<h'+n+'>'+escHtml(h[2])+'</h'+n+'>'; i++; continue; }
        if(!l.trim()){ i++; continue; }
        var p=[]; while(i<lines.length&&lines[i].trim()&&!/^(#{1,6}\s|```)/.test(lines[i])){p.push(lines[i]);i++;} out+='<p>'+escHtml(p.join(' '))+'</p>';
      }
      return out;
    }
    if(window.marked){
      try{ marked.setOptions({gfm:true,breaks:false}); }catch(e){}
      content.innerHTML = marked.parse(src);
    } else {
      content.innerHTML = renderMarkdownFallback(src);
      var w=document.createElement('div'); w.className='foot'; w.textContent='（离线模式：未加载 marked，使用简化渲染。联网刷新可得完整排版。）'; content.appendChild(w);
    }

    // —— 给标题生成稳定 id ——
    function slug(t){ return t.replace(/<[^>]+>/g,'').replace(/`/g,'').trim().toLowerCase().replace(/[^\w一-龥]+/g,'-').replace(/^-+|-+$/g,'')||'h'; }
    var used={};
    var heads = content.querySelectorAll('h1,h2,h3,h4');
    heads.forEach(function(h){
      var id = slug(h.textContent);
      if(used[id]) id = id+'-'+(++used[id]); else used[id]=1;
      h.id = id;
      // h2 数字前缀着色
      if(h.tagName==='H2'){ var m=h.textContent.match(/^(\d+\.)\s/); if(m){ h.innerHTML = '<span class="num">'+m[1]+'</span>'+h.innerHTML.replace(/^\d+\.\s/,''); } }
      // 锚点
      if(h.tagName==='H2'||h.tagName==='H3'){ var a=document.createElement('a'); a.className='anchor'; a.href='#'+id; a.textContent='#'; h.appendChild(a); }
    });

    // —— 构建目录（h2 + h3） ——
    var toc = document.getElementById('toc');
    var links = [];
    content.querySelectorAll('h2,h3').forEach(function(h){
      var a=document.createElement('a');
      a.href='#'+h.id;
      a.textContent = h.textContent.replace(/#$/,'').trim();
      a.className = (h.tagName==='H3'?'lv3':'lv2');
      a.dataset.id = h.id;
      a.addEventListener('click', function(){ document.getElementById('aside').classList.remove('open'); });
      toc.appendChild(a);
      links.push(a);
    });

    // —— 滚动高亮（scroll-spy） ——
    var byId = {}; links.forEach(function(a){ byId[a.dataset.id]=a; });
    var spy = new IntersectionObserver(function(entries){
      entries.forEach(function(en){
        if(en.isIntersecting){
          links.forEach(function(a){a.classList.remove('active');});
          var a = byId[en.target.id]; if(a){ a.classList.add('active'); a.scrollIntoView({block:'nearest'}); }
        }
      });
    }, {rootMargin:'-60px 0px -70% 0px', threshold:0});
    content.querySelectorAll('h2,h3').forEach(function(h){ spy.observe(h); });

    // —— 搜索过滤目录 ——
    document.getElementById('q').addEventListener('input', function(e){
      var q = e.target.value.trim().toLowerCase();
      links.forEach(function(a){ a.classList.toggle('hide', q && a.textContent.toLowerCase().indexOf(q)<0); });
    });

    // —— 代码块复制按钮 ——
    content.querySelectorAll('pre').forEach(function(pre){
      var b=document.createElement('button'); b.className='copy'; b.textContent='复制';
      b.addEventListener('click', function(){
        var code = pre.querySelector('code'); var txt = code?code.innerText:pre.innerText;
        navigator.clipboard.writeText(txt).then(function(){ b.textContent='已复制'; setTimeout(function(){b.textContent='复制';},1200); });
      });
      pre.appendChild(b);
    });

    // —— 页脚 ——
    var f=document.createElement('div'); f.className='foot';
    f.innerHTML='源文档：<code>docs/DESIGN.md</code>（本页据其渲染）· 如与代码不符以代码为准。';
    content.appendChild(f);

    // —— 主题切换 ——
    var THEME_KEY='ewdoc.theme';
    var saved = localStorage.getItem(THEME_KEY);
    if(saved) document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('theme').addEventListener('click', function(){
      var cur = document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
      document.documentElement.setAttribute('data-theme', cur);
      localStorage.setItem(THEME_KEY, cur);
    });

    // —— 移动端目录开关 ——
    document.getElementById('menuBtn').addEventListener('click', function(){
      document.getElementById('aside').classList.toggle('open');
    });

    // 进入时若有 hash，滚到位
    if(location.hash){ var el=document.getElementById(decodeURIComponent(location.hash.slice(1))); if(el) el.scrollIntoView(); }
  })();
